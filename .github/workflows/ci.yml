name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  service-intelligence-lint:
    name: Service Intelligence — Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-intelligence
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff black
      - run: ruff check app/
      - run: black --check app/

  service-intelligence-test:
    name: Service Intelligence — Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pranascan_test
          POSTGRES_USER: pranascan
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: service-intelligence
    env:
      DATABASE_URL: postgresql+asyncpg://pranascan:testpassword@localhost:5432/pranascan_test
      SECRET_KEY: test-secret-key-ci
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: service-intelligence/coverage.xml

  mobile-lint:
    name: Mobile — ESLint & TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --ext .ts,.tsx

  mobile-test:
    name: Mobile — Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --watchAll=false
