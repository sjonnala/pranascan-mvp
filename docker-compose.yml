services:
  db:
    image: postgres:16-alpine
    platform: linux/arm64
    restart: unless-stopped
    environment:
      POSTGRES_DB: pranascan
      POSTGRES_USER: pranascan
      POSTGRES_PASSWORD: pranascan_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pranascan"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    platform: linux/arm64
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8083
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8083:8080"
    volumes:
      - ./keycloak/pranapulse-realm.json:/opt/keycloak/data/import/pranapulse-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo HEALTHY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  service-intelligence:
    build:
      context: ./service-intelligence
      dockerfile: Dockerfile
    platform: linux/arm64
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://pranascan:pranascan_dev_password@db:5432/pranascan
      INTERNAL_SERVICE_TOKEN: ${APP_INTELLIGENCE_INTERNAL_TOKEN:-dev-internal-service-token}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./service-intelligence:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  service-core:
    build:
      context: ./service-core
      dockerfile: Dockerfile
    platform: linux/arm64
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CORE_DB_URL: jdbc:postgresql://db:5432/pranascan?currentSchema=core
      CORE_DB_USERNAME: pranascan
      CORE_DB_PASSWORD: pranascan_dev_password
      APP_INTELLIGENCE_INTERNAL_TOKEN: ${APP_INTELLIGENCE_INTERNAL_TOKEN:-dev-internal-service-token}
      APP_INTELLIGENCE_GRPC_HOST: service-intelligence
      APP_INTELLIGENCE_GRPC_PORT: 50051
      APP_SECURITY_ISSUER_URI: ${APP_SECURITY_ISSUER_URI:-http://localhost:8083/realms/pranapulse}
      APP_SECURITY_JWK_SET_URI: ${APP_SECURITY_JWK_SET_URI:-http://keycloak:8080/realms/pranapulse/protocol/openid-connect/certs}
      APP_SECURITY_REQUIRED_AUDIENCE: ${APP_SECURITY_REQUIRED_AUDIENCE:-pranapulse-core}
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
