syntax = "proto3";

package pranapulse.intelligence.scan.v1;

option java_multiple_files = true;
option java_package = "com.pranapulse.intelligence.grpc.scan.v1";
option java_outer_classname = "ScanIntelligenceProto";

service ScanIntelligenceService {
  rpc EvaluateScan (ScanEvaluationRequest) returns (ScanEvaluationResponse);
}

enum ScanType {
  SCAN_TYPE_UNSPECIFIED = 0;
  SCAN_TYPE_STANDARD = 1;
  SCAN_TYPE_DEEP_DIVE = 2;
}

message FrameSample {
  double t_ms = 1;
  double r_mean = 2;
  double g_mean = 3;
  double b_mean = 4;
}

message ScanEvaluationRequest {
  repeated FrameSample frame_data = 1;
  repeated double audio_samples = 2;

  oneof media_payload {
    bytes image_bytes = 3;
    bytes video_bytes = 4;
  }

  optional double hr_bpm = 5;
  optional double hrv_ms = 6;
  optional double respiratory_rate = 7;
  optional double voice_jitter_pct = 8;
  optional double voice_shimmer_pct = 9;
  double quality_score = 10;
  optional double lighting_score = 11;
  optional double motion_score = 12;
  optional double face_confidence = 13;
  optional double audio_snr_db = 14;
  repeated string flags = 15;
  optional double frame_r_mean = 16;
  optional double frame_g_mean = 17;
  optional double frame_b_mean = 18;
  ScanType scan_type = 19;
  optional double user_height_cm = 20;
}

message ScanEvaluationResponse {
  optional double hr_bpm = 1;
  optional double hrv_ms = 2;
  optional double spo2 = 3;
  optional double stiffness_index = 4;
  optional double respiratory_rate = 5;
  optional double voice_jitter_pct = 6;
  optional double voice_shimmer_pct = 7;
  double quality_score = 8;
  optional double lighting_score = 9;
  optional double motion_score = 10;
  optional double face_confidence = 11;
  optional double audio_snr_db = 12;
  repeated string flags = 13;
  repeated string warnings = 14;
  bool quality_gate_passed = 15;
  optional string rejection_reason = 16;
  optional double vascular_age_estimate = 17;
  optional double vascular_age_confidence = 18;
  optional double hb_proxy_score = 19;
  optional string anemia_wellness_label = 20;
  optional double anemia_confidence = 21;
}
