spring:
  application:
    name: service-core
  datasource:
    url: ${CORE_DB_URL:jdbc:postgresql://localhost:5432/pranapulse_core?currentSchema=core}
    username: ${CORE_DB_USERNAME:postgres}
    password: ${CORE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: core
    schemas: core
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: core
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    issuer-uri: ${APP_SECURITY_ISSUER_URI:http://localhost:8081/realms/pranapulse}
    jwk-set-uri: ${APP_SECURITY_JWK_SET_URI:http://localhost:8081/realms/pranapulse/protocol/openid-connect/certs}
    required-audience: ${APP_SECURITY_REQUIRED_AUDIENCE:pranapulse-core}
  consent:
    default-version: ${APP_CONSENT_DEFAULT_VERSION:1.0}
    deletion-hold-days: ${APP_CONSENT_DELETION_HOLD_DAYS:30}
  intelligence:
    internal-token: ${APP_INTELLIGENCE_INTERNAL_TOKEN:dev-internal-service-token}
    grpc-host: ${APP_INTELLIGENCE_GRPC_HOST:localhost}
    grpc-port: ${APP_INTELLIGENCE_GRPC_PORT:50051}
  trend:
    lookback-days: ${APP_TREND_LOOKBACK_DAYS:7}
    alert-threshold-pct: ${APP_TREND_ALERT_THRESHOLD_PCT:15.0}
    min-baseline-scans: ${APP_TREND_MIN_BASELINE_SCANS:3}
    cooldown-hours: ${APP_TREND_COOLDOWN_HOURS:48}
